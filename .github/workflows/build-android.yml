name: Construir APK Android

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-android.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v5

      - name: Instalar Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Preparar el SDK de Android
        uses: android-actions/setup-android@v3

      - name: Instalar componentes del SDK
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Preparar Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Compilar APK (debug)
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Renombrar el APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk at-el-sotillo-manager.apk

      - name: Subir el APK como artefacto
        uses: actions/upload-artifact@v5
        with:
          name: at-el-sotillo-manager-apk
          path: at-el-sotillo-manager.apk

      - name: Publicar el APK en Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: App Android (APK)
          body: |
            APK instalable de **AT El Sotillo Manager**.

            **Cómo instalar en Android:**
            1. Descarga `at-el-sotillo-manager.apk` (más abajo, en Assets).
            2. Ábrelo desde el móvil. Android pedirá permitir "instalar apps de origen desconocido" para tu navegador/gestor de archivos: acéptalo.
            3. Pulsa Instalar. Ya tienes la app "El Sotillo" en tu cajón de aplicaciones.

            La app carga la versión web publicada, así que se actualiza sola y sincroniza con la nube (Firebase) igual que en el navegador.
          files: at-el-sotillo-manager.apk
