<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <meta name="description" content="Gestión de reservas del alojamiento turístico AT El Sotillo." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>AT El Sotillo · Manager</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- ===== Cabecera ===== -->
  <header class="app-header">
    <div class="app-header__brand">
      <span class="app-header__logo">🏡</span>
      <div>
        <h1 class="app-header__title">AT El Sotillo</h1>
        <p class="app-header__subtitle" id="alojamientoNombre">Gestión de reservas</p>
      </div>
    </div>
    <nav class="app-nav" id="navPrincipal">
      <button class="app-nav__item is-active" data-vista="panel">🏠 Inicio</button>
      <button class="app-nav__item" data-vista="calendario">🗓️ Calendario</button>
      <button class="app-nav__item" data-vista="reservas">📋 Reservas</button>
      <button class="app-nav__item" data-vista="clientes">👥 Clientes</button>
      <button class="app-nav__item" data-vista="limpieza">🧹 Limpieza</button>
      <button class="app-nav__item" data-vista="estadisticas">📊 Estadísticas</button>
      <button class="app-nav__item" data-vista="alojamientos">🛏️ Unidades</button>
      <button class="app-nav__item" data-vista="ajustes">⚙️ Ajustes</button>
    </nav>
    <button class="app-header__menu-toggle" id="menuToggle" aria-label="Menú">☰</button>
  </header>

  <main class="app-main">
    <section class="vista" id="vista"></section>
  </main>

  <!-- ===== Modal genérico ===== -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <header class="modal__header">
        <h2 class="modal__title" id="modalTitulo">Título</h2>
        <button class="modal__close" id="modalCerrar" aria-label="Cerrar">✕</button>
      </header>
      <div class="modal__body" id="modalCuerpo"></div>
    </div>
  </div>

  <!-- ===== Avisos flotantes ===== -->
  <div class="toast-stack" id="toastStack" aria-live="polite"></div>

  <!-- Orden de carga: config nube → utilidades → estado → modelo → UI → vistas → arranque → sync -->
  <script src="js/firebase-config.js"></script>
  <script src="js/util.js"></script>
  <script src="js/store.js"></script>
  <script src="js/model.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/panel.js"></script>
  <script src="js/calendario.js"></script>
  <script src="js/reservas.js"></script>
  <script src="js/clientes.js"></script>
  <script src="js/limpieza.js"></script>
  <script src="js/estadisticas.js"></script>
  <script src="js/alojamientos.js"></script>
  <script src="js/ajustes.js"></script>
  <script src="js/app.js"></script>
  <!-- Sincronización en la nube (inactiva hasta configurar firebase-config.js) -->
  <script src="js/sync-firebase.js"></script>
</body>
</html>
